name: Generate blog post

# One draft PR per week (Monday 07:00 UTC). Requires GEMINI_API_KEY secret.
on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Generate AI-assisted blog post
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash-lite
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate post and rebuild blog
        run: python scripts/generate_blog_post.py

      - name: Verify Google Analytics on published HTML
        run: node scripts/check-google-analytics.cjs

      - name: Open blog draft pull request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ai/blog-post
          base: main
          delete-branch: true
          commit-message: "Add AI-assisted blog draft"
          title: "Add AI-assisted blog draft"
          body: |
            ## Summary
            - Weekly automation: one Gemini-generated Budget Plan blog draft per scheduled run.
            - Rebuilds the static blog pages, RSS feed, sitemap, and homepage latest-post section.

            ## Review checklist
            - Confirm the article has no fake claims, fake statistics, or personal financial advice.
            - Confirm the tone matches Budget Plan: practical, calm, privacy-first.
            - Confirm the rendered blog page and homepage card look correct.

      - name: Log pull request outcome
        env:
          CPR_OP: ${{ steps.cpr.outputs.pull-request-operation }}
          CPR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          CPR_NUM: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          echo "create-pull-request operation: ${CPR_OP:-<empty>}"
          echo "pull-request-number: ${CPR_NUM:-<empty>}"
          echo "pull-request-url: ${CPR_URL:-<empty>}"
          if [ -z "$CPR_URL" ]; then
            echo "If no PR was opened: https://github.com/${{ github.repository }}/compare/main...ai/blog-post"
          fi
